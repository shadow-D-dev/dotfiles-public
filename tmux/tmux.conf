# --- Gruvbox ---
set -g @bg1 "#3c3836"          # dark1 (main block)
set -g @bg1_light "#504945"    # dark2 (separator)

set -g @bg2 "#282828"          # dark0 (true background)
set -g @bg2_light "#3c3836"    # transition layer

set -g @bg3 "#665c54"          # dark3 (muted gray)
set -g @bg3_light "#7c6f64"    # dark4 (lighter gray)

set -g @bg4 "#928374"          # gray (accent neutral)
set -g @bg4_light "#a89984"    # light gray

set -g @bg5 "#ebdbb2"          # light1 (beige)
set -g @bg5_light "#fbf1c7"    # light0 (lighter beige)
set -g @bgw "#fbf1c7"          # white-ish background

# --- ACCENTS ---
set -g @accent "#d79921"       # yellow (gruvbox yellow)
set -g @accent_light "#fabd2f" # bright yellow

# --- FOREGROUND ---
set -g @fg1 "#a89984"          # fg3 (muted fg)
set -g @fg2 "#ebdbb2"          # fg1 (primary fg)

# --- STATUS COLORS ---
set -g @red "#fb4934"          # bright red
# --- Mode / Messages ---
set -g mode-style "fg=#{@bg5},bg=#{@bg1}"
set -g message-style "fg=#{@bg5},bg=#{@bg1}"
set -g message-command-style "fg=#{@bg5},bg=#{@bg1}"

# --- Panes ---
set -g pane-border-style "fg=#{@bg1}"
set -g pane-active-border-style "fg=#{@bg5}"

# --- Status Bar ---
set -g status on
set -g status-interval 1
set -g status-justify left
set -g status-style "fg=#{@fg1},bg=#{@bg2}"
set -g status-style "fg=#{@fg1},bg=#{@bg2}"
set -g status-bg "#{@bg2}"
set -g status-left-length 100
set -g status-right-length 100
set -g status-left-style none
set -g status-right-style none
# Left side: session + user
set -g status-left "#[fg=#15161E,bg=#{@bg5},bold] #S \
#[fg=#{@bgw},bg=#{@bg4}]#[fg=#{@bg1},bg=#{@bg4},bold,] "SHADOW" \
#[fg=#{@bg4_light},bg=#{@bg2}]"

# Right side: host info with layered separators
#[fg=#{@fg1},bg=#{@bg2}]#[fg=#{@bg4_light},bg=#{@fg1}],,bg=#{@fg2}
set -g status-right " #[fg=#{@bg4_light}]#[fg=#15161E,bg=#{@bg4},bold] #{pane_current_command} \#[fg=#{@bgw}]#[fg=#15161E,bg=#{@bg5},bold]  #{mem} |  #{cpu} "
# -----------------------------qwen-------------------------------------
bind -r b run-shell '\
  SESSION="claude-$(echo #{pane_current_path} | md5sum | cut -c1-8)"; \
  tmux has-session -t "$SESSION" 2>/dev/null || \
  tmux new-session -d -s "$SESSION" -c "#{pane_current_path}" "qwen"; \
  tmux display-popup -w80% -h80% -E "tmux attach-session -t $SESSION"'
# --- Windows ---
setw -g window-status-activity-style "underscore,fg=#{@fg2},bg=#{@bg2}"
setw -g window-status-separator ""
setw -g window-status-style "none,fg=#{@fg2},bg=#{@bg2}"

setw -g window-status-format "#[fg=#{@bg2},bg=#{@bg2}]#[default] #I  #{b:pane_current_path} #[fg=#{@bg2},bg=#{@bg2}]"

setw -g window-status-current-format "#[fg=#{@bg2},bg=#{@bg5},bold]#[fg=#{@accent},bg=#{@bg5}] #I #[fg=#{@bgw},bg=#{@accent}] #{b:pane_current_path} #[fg=#{@accent_light},bg=#{@bg2}]"
# ===================================================================
# Initialize TPM
# ===================================================================
run '~/.config/tmux/plugins/tpm/tpm'
